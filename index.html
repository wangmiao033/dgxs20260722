    html,body{height:100%;margin:0;background:#07121f;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif}
    .loading{height:100%;display:grid;place-items:center;text-align:center}.loading b{font-size:22px}.loading p{color:#9bb1c7}

  <script src="payload/chunk-09.js"></script>
  <script>
    (async()=>{try{
      const raw=atob(window.__DGXS_PAYLOAD||'');
      const bytes=new Uint8Array(raw.length); for(let i=0;i<raw.length;i++) bytes[i]=raw.charCodeAt(i);
      if(!('DecompressionStream' in window)) throw new Error('当前浏览器版本过低，请升级后访问。');
      const stream=new Blob([bytes]).stream().pipeThrough(new DecompressionStream('gzip'));
      const html=await new Response(stream).text(); document.open(); document.write(html); document.close();
    }catch(err){document.body.innerHTML='<div class="loading"><div><b>页面载入失败</b><p>'+String(err.message||err)+'</p></div></div>';}})();
  </script>
