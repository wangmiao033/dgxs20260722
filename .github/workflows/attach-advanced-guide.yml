name: Attach advanced guide

on:
  push:
    branches: [main]
    paths:
      - advanced-guide.js
      - .github/workflows/attach-advanced-guide.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  attach:
    if: github.actor != 'dgxs-release-bot'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Attach guide script
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('index.html')
          text = path.read_text(encoding='utf-8')
          tag = '  <script src="/advanced-guide.js?v=20260723-v10"></script>'
          if tag not in text:
              text = text.replace('</body>', tag + '\n</body>')
              path.write_text(text, encoding='utf-8')
          PY
      - name: Commit production entry
        run: |
          if git diff --quiet -- index.html; then
            echo "Advanced guide already attached"
            exit 0
          fi
          git config user.name "dgxs-release-bot"
          git config user.email "actions@users.noreply.github.com"
          git add index.html
          git commit -m "feat: publish APK advanced strategy guide"
          git push
