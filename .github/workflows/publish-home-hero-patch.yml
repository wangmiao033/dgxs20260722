name: Publish home hero catalog button

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/publish-home-hero-patch.yml'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Attach home hero catalog patch
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('index.html')
          text = path.read_text(encoding='utf-8')
          tag = '  <script src="/home-hero-patch.js?v=20260723-v11"></script>\n'
          if '/home-hero-patch.js' not in text:
              text = text.replace('</body>', tag + '</body>')
              path.write_text(text, encoding='utf-8')
          PY
      - name: Commit production entry
        run: |
          if git diff --quiet; then
            echo 'Home hero patch already attached.'
            exit 0
          fi
          git config user.name 'dgxs-release-bot'
          git config user.email 'actions@users.noreply.github.com'
          git add index.html
          git commit -m 'ui: publish home hero catalog button'
          git push origin main
